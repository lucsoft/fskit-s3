[package]
name = "fskit-s3-ext"
version = "0.1.0"
edition.workspace = true
license.workspace = true

# The FSKit extension logic, in Rust. Defines the FSUnaryFileSystem / FSVolume /
# FSItem subclasses via objc2 and delegates every operation to a StorageBackend.
# Built as a `staticlib` and linked into an Xcode-managed .appex (which handles
# the extension-point plumbing, entitlements, and signing). A tiny ObjC stub in
# that target calls `fskit_s3_register` from +load so the Rust-defined classes
# are registered before FSKit looks up the principal class.
[lib]
name = "fskit_s3_ext"
crate-type = ["staticlib"]

[dependencies]
fskit-s3-core = { workspace = true, features = ["mem"] }
fskit-s3-backend = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread"] }
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSString",
    "NSData",
    "NSError",
    "NSUUID",
] }
block2 = "0.6"
libc = "0.2"
